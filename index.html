<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm Clock</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Alarm Clock</h1>
            <p style="color: #666; font-size: 14px; margin-bottom: 15px;">
                Set alarms across multiple timezones. Choose your preferred timezone for the clock display, 
                then create alarms in any timezone worldwide. Perfect for managing schedules across different time zones.
            </p>
            <div class="clock-controls">
                <label for="clock-timezone">Preference Timezone:</label>
                <select id="clock-timezone">
                    <option value="America/New_York">Eastern Time (ET)</option>
                    <option value="America/Chicago">Central Time (CT)</option>
                    <option value="America/Denver">Mountain Time (MT)</option>
                    <option value="America/Los_Angeles">Pacific Time (PT)</option>
                    <option value="America/Phoenix">Arizona Time (MST)</option>
                    <option value="America/Anchorage">Alaska Time (AKT)</option>
                    <option value="Pacific/Honolulu">Hawaii Time (HST)</option>
                    <option value="Asia/Amman">Jordan Time (EET)</option>
                    <option value="Europe/London">London (GMT/BST)</option>
                    <option value="Europe/Paris">Paris (CET/CEST)</option>
                    <option value="Asia/Tokyo">Tokyo (JST)</option>
                    <option value="Asia/Shanghai">Shanghai (CST)</option>
                    <option value="Asia/Dubai">Dubai (GST)</option>
                    <option value="Australia/Sydney">Sydney (AEDT/AEST)</option>
                </select>
            </div>
            <div id="clock-display"></div>
        </header>

        <main>
            <section id="alarm-form-section">
                <h2>Set Alarm</h2>
                <div id="alarm-form-container"></div>
            </section>

            <section id="alarm-list-section">
                <h2>Your Alarms</h2>
                <div id="alarm-list-container"></div>
            </section>
        </main>

        <div id="alarm-trigger-modal" class="modal hidden">
            <div class="modal-content">
                <div id="alarm-trigger-container"></div>
            </div>
        </div>

        <div id="warning-message" class="warning">
            ⚠️ Keep this browser tab open for alarms to work
        </div>
    </div>

    <script type="module" src="services/storage.js"></script>
    <script type="module" src="services/time-service.js"></script>
    <script type="module" src="services/alarm-service.js"></script>
    <script type="module" src="components/clock.js"></script>
    <script type="module" src="components/alarm-form.js"></script>
    <script type="module" src="components/alarm-list.js"></script>
    <script type="module" src="components/alarm-trigger.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
